apiVersion: apps/v1
kind: Deployment
metadata:
  name: mempalace
  namespace: mempalace
  labels:
    app: mempalace
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mempalace
      component: server
  template:
    metadata:
      labels:
        app: mempalace
        component: server
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mempalace
        image: quay.io/aicatalyst/mempalace:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: MEMPALACE_HOME
          value: "/opt/app-root/data"
        - name: PYTHONUNBUFFERED
          value: "1"
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /opt/app-root/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mempalace-data
